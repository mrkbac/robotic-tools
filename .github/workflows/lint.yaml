name: Lint

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Compute submodule cache key
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD data/ | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: |
            data/data
            data/mcap
          key: submodules-${{ runner.os }}-${{ steps.submodule-key.outputs.hash }}

      - name: Checkout submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth=1
          git submodule foreach --recursive 'git lfs pull'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          activate-environment: true
          enable-cache: true
      - name: Install pip (required by pre-commit action)
        run: uv pip install pip
      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install
        working-directory: mcap-web-inspector

      - uses: pre-commit/action@v3.0.1
