name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "mcap-web-inspector/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: mcap-web-inspector

      - name: Build
        run: bun run build
        working-directory: mcap-web-inspector

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: mcap-web-inspector/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
