name: Test

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        package:
          - { dir: small-mcap, cov: true, submodules: true }
          - { dir: pymcap-cli, cov: true, submodules: true }
          - { dir: mcap-ros2-support-fast, cov: true, submodules: true }
          - { dir: ros-parser, cov: true, submodules: false }
          - { dir: pointcloud2, cov: true, submodules: false }
          - { dir: pureini, cov: true, submodules: false }
          - { dir: digitalis, cov: false, submodules: false }

    name: test (${{ matrix.package.dir }}, ${{ matrix.python-version }})

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ matrix.package.submodules }}

      - name: Compute submodule cache key
        if: matrix.package.submodules
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD data/ | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache submodules
        if: matrix.package.submodules
        id: submodule-cache
        uses: actions/cache@v5
        with:
          path: |
            data/data
            data/mcap
          key: submodules-${{ runner.os }}-${{ steps.submodule-key.outputs.hash }}

      - name: Checkout submodules
        if: matrix.package.submodules && steps.submodule-cache.outputs.cache-hit != 'true'
        run: |
          git submodule update --init --depth=1
          git submodule foreach --recursive 'git lfs pull'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras --all-packages

      - name: Install mcap CLI
        if: matrix.package.dir == 'pymcap-cli'
        run: |
          curl -L https://github.com/foxglove/mcap/releases/download/releases%2Fmcap-cli%2Fv0.0.57/mcap-linux-amd64 -o /tmp/mcap
          chmod +x /tmp/mcap
          sudo mv /tmp/mcap /usr/local/bin/mcap
          mcap version

      - name: Run tests
        run: |
          cov_module=$(echo "${{ matrix.package.dir }}" | tr '-' '_')
          if [ "${{ matrix.package.cov }}" = "true" ]; then
            uv run pytest ${{ matrix.package.dir }}/tests -v --cov=$cov_module -m "not benchmark" -n auto
          else
            uv run pytest ${{ matrix.package.dir }}/tests -v --no-cov -m "not benchmark" -n auto
          fi

      - name: Upload coverage reports to Codecov
        if: matrix.package.cov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.package.dir }}
