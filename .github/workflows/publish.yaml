name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all" for all packages)'
        required: true
        default: "all"
        type: choice
        options:
          - all
          - digitalis
          - mcap-ros2-support-fast
          - pymcap-cli
          - ros-parser
          - small-mcap
          - robo-ws-bridge
          - websocket-proxy
      dry_run:
        description: "Dry run (build but do not publish)"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    uses: ./.github/workflows/lint.yaml

  test:
    uses: ./.github/workflows/test.yaml
    secrets: inherit

  publish:
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.package }}/
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - digitalis
          - mcap-ros2-support-fast
          - pymcap-cli
          - ros-parser
          - small-mcap
          - robo-ws-bridge
          - websocket-proxy

    steps:
      - uses: actions/checkout@v5

      - name: Check if version needs publishing
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.package }}" != "all" ]] && [[ "${{ inputs.package }}" != "${{ matrix.package }}" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=not selected" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          version=$(python3 -c "
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('${{ matrix.package }}/pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/${{ matrix.package }}/${version}/json")

          if [[ "$http_code" == "200" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=${{ matrix.package }}==${version} already on PyPI" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log skip reason
        if: steps.check.outputs.skip == 'true'
        run: echo "Skipping — ${{ steps.check.outputs.reason }}"

      - name: Install uv
        if: steps.check.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: uv build --package ${{ matrix.package }}

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        run: uv publish dist/*
