name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all" for all packages)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - digitalis
          - mcap-ros2-support-fast
          - pymcap-cli
          - ros-parser
          - small-mcap
          - websocket-bridge
          - websocket-proxy
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ matrix.package }}/
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - digitalis
          - mcap-ros2-support-fast
          - pymcap-cli
          - ros-parser
          - small-mcap
          - websocket-bridge
          - websocket-proxy

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          submodules: true

      - name: Check if package should be published
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.package }}" == "all" ]] || [[ "${{ inputs.package }}" == "${{ matrix.package }}" ]]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.check.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Build package
        if: steps.check.outputs.should_run == 'true'
        run: uv build --package ${{ matrix.package }}

      - name: Publish to PyPI
        if: steps.check.outputs.should_run == 'true' && !inputs.dry_run
        run: uv publish dist/*
