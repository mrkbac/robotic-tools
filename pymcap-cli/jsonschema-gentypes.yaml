# jsonschema-gentypes configuration for pymcap-cli JSON schemas
# This file controls auto-generation of TypedDict definitions from JSON schema

# Header added to generated files
headers: |
  # ruff: noqa: I001, E501
  # AUTO-GENERATED from pymcap-cli/schemas/ - DO NOT EDIT

# Post-generation formatters
# Note: Formatting is handled by pre-commit (ruff-format and ruff-check hooks)
# so callbacks are not needed here
callbacks: []

# Pre-commit integration settings
pre_commit:
  enabled: true
  arguments:
    - --color=never
  # Only run the formatter on the freshly generated file. Without this, the tool
  # invokes a bare `pre-commit run --files=<dest>`, and the `always_run` hooks
  # (pytest, ty, import-linter) ignore `--files` and re-run the whole suite,
  # turning a ~0.1s codegen into a ~50s one. ruff-format alone reproduces the
  # committed output byte-for-byte.
  hooks:
    - ruff-format

# Line length for code generation (matches project ruff config)
lineLength: 100

# Target Python version (matches project requirements)
python_version: "3.10"

# Generation rules
generate:
  - source: pymcap-cli/schemas/mcap_info.json
    destination: pymcap-cli/src/pymcap_cli/types/info_types.py
    root_name: McapInfoOutput
    api_arguments:
      additional_properties: Only explicit # Strict typing - no extra fields allowed
      get_name_properties: UpperFirst # Use UpperFirst for class names

  - source: pymcap-cli/schemas/mcap_check_spec.json
    destination: pymcap-cli/src/pymcap_cli/types/check_spec_types.py
    root_name: CheckSpecInput
    api_arguments:
      additional_properties: Only explicit # Strict typing - no extra fields allowed
      get_name_properties: UpperFirst # Use UpperFirst for class names

  # TypeScript types are generated via a separate npm script (json-schema-to-typescript)
  # rather than jsonschema-gentypes (which is Python-only).
  # See the generate-ts-types pre-commit hook and mcap-web-inspector/package.json.
  # - source: pymcap-cli/schemas/mcap_info.json
  #   destination: mcap-web-inspector/src/mcap/types.generated.ts
